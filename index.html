<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="description" content="GPS Acessível – Colégio Estadual Professora Silva Ferreira de Brito" />
  <title>GPS Escola – Silva Ferreira de Brito</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #0a1628;
      --bg2: #111e38;
      --card: #162240;
      --accent: #00e5b0;
      --accent2: #ffb800;
      --danger: #ff4d6d;
      --text: #e8f0fe;
      --muted: #7b93c4;
      --radius: 16px;
      --font: 'Atkinson Hyperlegible', sans-serif;
      --mono: 'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 18px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg2);
      padding: 16px 20px 12px;
      text-align: center;
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── MAIN ── */
    main {
      padding: 20px 16px 100px;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── BIG MIC BUTTON ── */
    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 28px 20px;
      background: var(--card);
      border-radius: var(--radius);
      border: 2px solid transparent;
      transition: border-color 0.3s;
    }
    .mic-section.listening {
      border-color: var(--danger);
      animation: pulse-border 1s infinite;
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--danger); }
      50% { border-color: rgba(255,77,109,0.3); }
    }

    .mic-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      background: var(--bg);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mic-btn:active { transform: scale(0.93); }
    .mic-btn.listening {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
      animation: pulse-mic 1s infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,109,0.5); }
      50% { box-shadow: 0 0 0 20px rgba(255,77,109,0); }
    }
    .mic-btn svg { width: 44px; height: 44px; }

    .mic-label {
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }
    .mic-hint {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
    .transcript-box {
      background: var(--bg);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      color: var(--accent2);
      min-height: 40px;
      width: 100%;
      text-align: center;
      font-style: italic;
      display: none;
    }
    .transcript-box.visible { display: block; }

    /* ── DIRECTIONS BOX ── */
    .directions-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    .directions-section.visible { display: flex; }

    .dir-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dir-header .icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1.3rem;
    }
    .dir-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }
    .dir-header p {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .steps-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .steps-list li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      line-height: 1.4;
    }
    .step-num {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
      background: rgba(0,229,176,0.1);
      border-radius: 6px;
      padding: 2px 8px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .repeat-btn {
      margin-top: 4px;
      background: rgba(0,229,176,0.12);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      font-size: 1rem;
      font-family: var(--font);
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .repeat-btn:active { background: rgba(0,229,176,0.25); }

    /* ── LOCATION GRID ── */
    .locations-section h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
      font-family: var(--mono);
    }
    .loc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .loc-btn {
      background: var(--card);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .loc-btn:active { transform: scale(0.96); }
    .loc-btn:hover, .loc-btn:focus {
      border-color: var(--accent);
      outline: none;
    }
    .loc-btn .emoji { font-size: 1.5rem; display: block; margin-bottom: 6px; }
    .loc-btn .name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      display: block;
    }
    .loc-btn .sub {
      font-size: 0.72rem;
      color: var(--muted);
      display: block;
      margin-top: 2px;
    }

    /* ── MAP ── */
    .map-section {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .map-section h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 14px 16px 10px;
      font-family: var(--mono);
    }
    #school-map {
      width: 100%;
      display: block;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid rgba(0,229,176,0.2);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .status-dot.inactive { background: var(--muted); }

    /* ── SPEAKING INDICATOR ── */
    .speaking-badge {
      display: none;
      position: fixed;
      top: 80px; left: 50%; transform: translateX(-50%);
      background: var(--accent2);
      color: #000;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 16px;
      border-radius: 20px;
      z-index: 200;
      gap: 6px;
      align-items: center;
    }
    .speaking-badge.visible { display: flex; }

    /* ── FOCUS VISIBLE ── */
    *:focus-visible {
      outline: 3px solid var(--accent2);
      outline-offset: 3px;
    }
  </style>
</head>

// ══════════════════════════════════════════════════════
//  VOICE SYNTHESIS
// ══════════════════════════════════════════════════════
let currentUtterance = null;
const badge = document.getElementById('speaking-badge');

function speak(text, onEnd) {
  window.speechSynthesis.cancel();
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = 'pt-BR';
  currentUtterance.rate = 0.92;
  currentUtterance.pitch = 1.0;
  currentUtterance.volume = 1.0;

  // Prefer a Brazilian Portuguese voice if available
  const voices = window.speechSynthesis.getVoices();
  const ptVoice = voices.find(v => v.lang === 'pt-BR') ||
                  voices.find(v => v.lang.startsWith('pt'));
  if (ptVoice) currentUtterance.voice = ptVoice;

  badge.classList.add('visible');
  currentUtterance.onend = () => {
    badge.classList.remove('visible');
    if (onEnd) onEnd();
  };
  currentUtterance.onerror = () => badge.classList.remove('visible');
  window.speechSynthesis.speak(currentUtterance);
}

function speakSteps(steps) {
  const intro = 'Atenção. Siga as instruções: ';
  const full = intro + steps.map((s, i) => `Passo ${i+1}: ${s}`).join('. ');
  speak(full);
}

// ══════════════════════════════════════════════════════
//  SPEECH RECOGNITION
// ══════════════════════════════════════════════════════
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

const micBtn = document.getElementById('mic-btn');
const micSection = document.getElementById('mic-section');
const micLabel = document.getElementById('mic-label');
const transcriptBox = document.getElementById('transcript-box');

function setupRecognition() {
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = 'pt-BR';
  r.interimResults = true;
  r.maxAlternatives = 3;
  r.continuous = false;

  r.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micBtn.setAttribute('aria-pressed', 'true');
    micSection.classList.add('listening');
    micLabel.textContent = 'Ouvindo…';
    transcriptBox.textContent = '';
    transcriptBox.classList.add('visible');
    setStatus('Ouvindo…', true);
  };

  r.onresult = (e) => {
    const interim = Array.from(e.results)
      .map(r => r[0].transcript).join('');
    transcriptBox.textContent = `"${interim}"`;
    if (e.results[e.results.length - 1].isFinal) {
      const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
      handleVoiceInput(transcript);
    }
  };

  r.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.setAttribute('aria-pressed', 'false');
    micSection.classList.remove('listening');
    micLabel.textContent = 'Toque para falar o destino';
    setStatus('Pronto para navegar');
  };

  r.onerror = (e) => {
    console.warn('Speech error:', e.error);
    micLabel.textContent = 'Erro. Tente novamente.';
    isListening = false;
    micBtn.classList.remove('listening');
    micSection.classList.remove('listening');
    setStatus('Erro de microfone');
    speak('Não consegui ouvir. Por favor, tente novamente.');
  };

  return r;
}

micBtn.addEventListener('click', () => {
  window.speechSynthesis.cancel();
  if (isListening) {
    recognition && recognition.stop();
    return;
  }
  if (!SpeechRecognition) {
    speak('Reconhecimento de voz não disponível neste navegador. Por favor, toque em um dos botões de destino na tela.');
    return;
  }
  recognition = setupRecognition();
  try { recognition.start(); }
  catch(e) { console.warn(e); }
});

// ══════════════════════════════════════════════════════
//  MATCHING
// ══════════════════════════════════════════════════════
function findLocation(text) {
  const t = text.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, '');
  return LOCATIONS.find(loc =>
    loc.keywords.some(kw => {
      const k = kw.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      return t.includes(k);
    })
  );
}

function handleVoiceInput(text) {
  const loc = findLocation(text);
  if (loc) {
    navigateTo(loc);
  } else {
    speak(`Não encontrei o local "${text}". Diga, por exemplo: secretaria, sala de aula 3, banheiro, ou pátio.`);
    setStatus('Local não encontrado');
  }
}

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
let currentLoc = null;

function navigateTo(loc) {
  currentLoc = loc;

  // Update directions UI
  document.getElementById('dest-icon').textContent = loc.emoji;
  document.getElementById('dest-name').textContent = loc.name;
  document.getElementById('dest-dist').textContent = loc.sub;

  const list = document.getElementById('steps-list');
  list.innerHTML = '';
  loc.steps.forEach((step, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="step-num">${i + 1}</span><span>${step}</span>`;
    list.appendChild(li);
  });

  document.getElementById('directions-section').classList.add('visible');

  // Highlight map room
  document.querySelectorAll('.room-hl').forEach(el => {
    el.classList.remove('room-hl');
    el.classList.add('room');
  });
  document.querySelectorAll('.room-label-hl').forEach(el => {
    el.classList.remove('room-label-hl');
    el.classList.add('room-label');
  });
  if (loc.mapId) {
    const mapEl = document.getElementById(loc.mapId);
    if (mapEl) {
      mapEl.classList.remove('room');
      mapEl.classList.add('room-hl');
    }
  }
  document.getElementById('person-marker').style.display = 'block';

  setStatus(`Navegando para: ${loc.name}`);
  speakSteps(loc.steps);

  // Scroll to directions
  setTimeout(() => {
    document.getElementById('directions-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
}

// ══════════════════════════════════════════════════════
//  REPEAT BUTTON
// ══════════════════════════════════════════════════════
document.getElementById('repeat-btn').addEventListener('click', () => {
  if (currentLoc) speakSteps(currentLoc.steps);
});

// ══════════════════════════════════════════════════════
//  STATUS BAR
// ══════════════════════════════════════════════════════
function setStatus(msg, active = false) {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.classList.toggle('inactive', !active);
}

// ══════════════════════════════════════════════════════
//  BUILD LOCATION GRID
// ══════════════════════════════════════════════════════
const grid = document.getElementById('loc-grid');
LOCATIONS.forEach(loc => {
  const btn = document.createElement('button');
  btn.className = 'loc-btn';
  btn.setAttribute('role', 'listitem');
  btn.setAttribute('aria-label', `Ir para ${loc.name}`);
  btn.innerHTML = `
    <span class="emoji" aria-hidden="true">${loc.emoji}</span>
    <span class="name">${loc.name}</span>
    <span class="sub">${loc.sub}</span>
  `;
  btn.addEventListener('click', () => navigateTo(loc));
  grid.appendChild(btn);
});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  // Pre-load voices
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    window.speechSynthesis.getVoices();
  });

  if (!SpeechRecognition) {
    micLabel.textContent = 'Use os botões abaixo';
    micBtn.style.opacity = '0.5';
    micBtn.style.cursor = 'default';
    micBtn.setAttribute('aria-label', 'Reconhecimento de voz indisponível. Use os botões abaixo.');
  }

  // Welcome message (short delay for TTS to be ready)
  setTimeout(() => {
    speak('Bem-vindo ao GPS do Colégio Estadual Professora Silva Ferreira de Brito. Toque no botão central e diga o local que deseja ir, ou escolha um destino pelos botões na tela.');
  }, 800);
});
